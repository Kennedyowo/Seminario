    <script>
     
        const materiasPorGrado = {
            "1": ["Español", "Matemáticas", "Química", "Historia", "F. Cívica y Ética", "Artes", "Inglés", "Tecnología"],
            "2": ["Español", "Matemáticas", "Química", "Historia", "F. Cívica y Ética", "Artes", "Inglés", "Tecnología"],
            "3": ["Español", "Matemáticas", "Química", "Historia", "F. Cívica y Ética", "Artes", "Inglés", "Tecnología"]
        };

        const selectGrado = document.getElementById("grado");
        const selectMateria = document.getElementById("nombre-materia");

       
        function cargarMaterias(grado) {
         
            selectMateria.innerHTML = '<option value="" disabled selected>Selecciona una materia</option>';

            if (grado && materiasPorGrado[grado]) {
                materiasPorGrado[grado].forEach(materia => {
                    const option = document.createElement("option");
                    option.value = materia;
                    option.textContent = materia;
                    selectMateria.appendChild(option);
                });
            } else {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "No hay materias disponibles";
                option.disabled = true;
                selectMateria.appendChild(option);
            }
        }

    
        selectGrado.addEventListener("change", function() {
            cargarMaterias(this.value);
        });

       
        window.addEventListener("load", function() {
            if (selectGrado.value) {
                cargarMaterias(selectGrado.value);
            }
        });
    </script>
