<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Alumnos</title>
     <style>/* CONTENEDOR DE LA TABLA */
.tabla-contenedor{
    width: 90%;
    max-width: 1100px;
    margin: 30px auto;
    background-color: rgba(255,255,255,0.95);
    border: 5px solid #007BFF;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

/* TÍTULO DE LA TABLA */
.tabla-contenedor h2{
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

/* TABLA */
table{
    width: 100%;
    border-collapse: collapse;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
    border-radius: 8px;
}

/* ENCABEZADOS */
th{
    background-color: #007BFF;
    color: white;
    padding: 12px;
    font-size: 16px;
}

/* CELDAS */
td{
    padding: 10px;
    text-align: center;
    border: 1px solid #ccc;
}

/* FILAS PARES */
tr:nth-child(even){
    background-color: #f2f8ff;
}

/* EFECTO AL PASAR EL MOUSE */
tr:hover{
    background-color: #d9ecff;
    transition: .3s;
}

/* INFORMACIÓN DE LA BOLETA */
.info-alumno{
    margin-bottom: 15px;
    font-size: 18px;
    color: #333;
}

.info-alumno strong{
    color:#007BFF;
}</style>
</head>
<body>

<div class="tabla-contenedor">

    <h2>Lista de Alumnos</h2>

    <table>

        <tr>
            <th>No.</th>
            <th>Nombre</th>
            <th>Grado</th>
            <th>Grupo</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Juan Pérez</td>
            <td>2°</td>
            <td>A</td>
        </tr>

        <tr>
            <td>2</td>
            <td>María López</td>
            <td>2°</td>
            <td>A</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Carlos Hernández</td>
            <td>2°</td>
            <td>A</td>
        </tr>

        <tr>
            <td>4</td>
            <td>Ana García</td>
            <td>2°</td>
            <td>A</td>
        </tr>

    </table>

</div>

</body>
</html>
